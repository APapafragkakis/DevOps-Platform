apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
  namespace: devops-platform
  labels:
    app: devops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # zero-downtime deployments
  template:
    metadata:
      labels:
        app: devops-platform
    spec:
      # Never pull cached image — always use exact tag
      containers:
        - name: app
          image: ghcr.io/YOUR_GITHUB_USERNAME/devops-platform:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devops-platform-secrets
                  key: DATABASE_URL

          # Resource limits — critical for production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Liveness probe — K8s restarts the pod if this fails
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          # Readiness probe — pod only receives traffic when ready
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2

      # Spread pods across nodes for availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: devops-platform

