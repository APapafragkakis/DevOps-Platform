replicaCount: 2

image:
  repository: ghcr.io/YOUR_GITHUB_USERNAME/devops-platform/devops-platform
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: devops-platform.example.com
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  LOG_LEVEL: INFO
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CACHE_TTL_SECONDS: "60"

secrets:
  databaseUrl: ""      # set via --set or external secret
  secretKey: ""        # set via --set or external secret
  redisUrl: ""

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

